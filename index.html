<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Merch Store</title>
<link rel="icon" type="image/png" href="favicon.png" />
  <!-- Google Analytics (replace G-XXXXXXXXXX with your Measurement ID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JQNYGB0H1J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-JQNYGB0H1J');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-g" style="color:#4285F4">G</span><span class="logo-o1" style="color:#EA4335">o</span><span class="logo-o2" style="color:#FBBC05">o</span><span class="logo-g2" style="color:#4285F4">g</span><span class="logo-l" style="color:#34A853">l</span><span class="logo-e" style="color:#EA4335">e</span>
        <span class="logo-store">Store</span>
      </div>
      <nav class="nav-links">
        <a href="#">New Arrivals</a>
        <a href="#">Accessories</a>
        <a href="#">Apparel</a>
      </nav>
      <button class="cart-btn" onclick="openCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- HERO BANNER -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-tag">Official Collection 2025</p>
      <h1 class="hero-title">Wear the Brand<br>You Build With</h1>
      <p class="hero-sub">Exclusive Google merchandise — thoughtfully designed, built to last.</p>
    </div>
    <div class="hero-dots">
      <span style="background:#4285F4"></span>
      <span style="background:#EA4335"></span>
      <span style="background:#FBBC05"></span>
      <span style="background:#34A853"></span>
    </div>
  </section>

  <!-- PRODUCTS GRID -->
  <main class="store-main">
    <div class="section-header">
      <h2>Featured Products</h2>
      <p>7 items</p>
    </div>

    <div class="products-grid" id="productsGrid">
      <!-- Cards injected by app.js -->
    </div>
  </main>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button onclick="closeCart()" class="close-btn">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="empty-cart">Your cart is empty.</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <a href="checkout.html" class="checkout-link" id="checkoutLink">Proceed to Checkout →</a>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
